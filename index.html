<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahi Pro DSLR</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        #app-layer { position: relative; width: 100vw; height: 100vh; }
        
        /* High-Definition Video Render */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: filter 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            image-rendering: optimizeQuality;
        }

        /* --- एडवांस्ड ब्यूटी फिल्टर्स (AI Logic) --- */
        .normal { filter: none; }
        /* Beauty Mode: सॉफ्ट स्किन + ब्राइट ग्लो (Pinkish Tone) */
        .beauty { filter: brightness(1.35) saturate(1.4) contrast(1.1) sepia(0.05) blur(0px); }
        /* Summer Mode: वाइब्रेंट, क्लियर और गहरा रंग */
        .summer { filter: brightness(1.25) saturate(1.6) contrast(1.2) hue-rotate(-2deg); }
        /* AI Mode: अल्ट्रा शार्प, हाई क्लेरिटी और नेचुरल टोन */
        .ai-mode { filter: contrast(1.35) brightness(1.18) saturate(1.25) drop-shadow(0 0 1px #fff); }

        /* UI elements */
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 100; box-sizing: border-box; }
        .zoom-display { position: absolute; top: 75px; width: 100%; text-align: center; color: #00f2ff; font-weight: bold; font-size: 18px; z-index: 100; text-shadow: 0 0 5px #000; }
        
        .footer { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 30px 0 60px; z-index: 100; }
        .mode-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .m-btn { font-size: 12px; color: #888; letter-spacing: 1.5px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .m-btn.active { color: #00f2ff; transform: scale(1.15); border-bottom: 2px solid #00f2ff; }

        .shutter-row { display: flex; align-items: center; justify-content: space-evenly; }
        .thumb { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-color: #222; }
        .shutter { width: 85px; height: 85px; border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .s-core { width: 68px; height: 68px; background: #fff; border-radius: 50%; transition: 0.15s; }
        .shutter:active .s-core { transform: scale(0.8); background: #ddd; }
        .rec-active { background: #ff0000 !important; border-radius: 12px; }

        .btn-ico { font-size: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app-layer" ontouchstart="handleTS(event)" ontouchmove="handleTM(event)">
        <video id="vid" autoplay playsinline muted></video>
        
        <div class="header">
            <div class="btn-ico" id="flash-btn" onclick="toggleFlash()">⚡ OFF</div>
            <div class="btn-ico" id="type-btn" onclick="changeType()">📸</div>
        </div>

        <div class="zoom-display" id="z-txt">1.0x</div>

        <div class="footer">
            <div class="mode-selector">
                <div class="m-btn active" onclick="apply(this, 'normal')">NORMAL</div>
                <div class="m-btn" onclick="apply(this, 'beauty')">BEAUTY+</div>
                <div class="m-btn" onclick="apply(this, 'summer')">SUMMER</div>
                <div class="m-btn" onclick="apply(this, 'ai-mode')">AI DSLR</div>
            </div>

            <div class="shutter-row">
                <div class="thumb" id="prev-box"></div>
                <div class="shutter" onclick="trigger()">
                    <div class="s-core" id="s-core"></div>
                </div>
                <div class="btn-ico" onclick="flip()">🔄</div>
            </div>
        </div>
    </div>

    <canvas id="out" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('vid');
        const c = document.getElementById('out');
        const prev = document.getElementById('prev-box');
        let stream, facing = "user", isVideo = false, isRec = false, recorder, chunks = [];
        let zoom = 1, flash = "off", initialDist = 0;

        async function startApp() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                // 10x Zoom और 4K Support के लिए Constraints
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facing, width: {ideal: 3840}, height: {ideal: 2160} },
                    audio: true 
                });
                v.srcObject = stream;
            } catch (e) { console.error("Error", e); }
        }

        // --- 10x Ultra-Smooth Zoom (बिना रिफ्रेश के) ---
        function handleTS(e) { if (e.touches.length === 2) initialDist = 0; }
        function handleTM(e) {
            if (e.touches.length === 2) {
                let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (initialDist === 0) initialDist = d;
                else {
                    let factor = d / initialDist;
                    zoom = Math.min(Math.max(1, zoom * factor), 10); // 10 गुना ज़ूम
                    v.style.transform = `scale(${zoom})`;
                    document.getElementById('z-txt').innerText = zoom.toFixed(1) + "x";
                    initialDist = d;
                }
            }
        }

        function toggleFlash() {
            flash = (flash === "off") ? "on" : "off";
            const btn = document.getElementById('flash-btn');
            btn.innerText = (flash === "on") ? "⚡ ON" : "⚡ OFF";
            btn.style.color = (flash === "on") ? "#ffcc00" : "#fff";
        }

        function apply(el, f) {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            v.className = f;
        }

        function changeType() {
            isVideo = !isVideo;
            document.getElementById('type-btn').innerText = isVideo ? "🎥" : "📸";
        }

        async function trigger() {
            const track = stream.getVideoTracks()[0];
            
            // फ्लैश ऑन है तो सिर्फ क्लिक के वक्त टॉर्च जलेगी (Back Camera)
            if (flash === "on" && facing === "environment") {
                await track.applyConstraints({ advanced: [{ torch: true }] });
            }

            if (!isVideo) {
                // Photo Capture
                setTimeout(async () => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    const ctx = c.getContext('2d');
                    ctx.filter = getComputedStyle(v).filter;
                    
                    // Zoom Logic in Capture
                    const sw = v.videoWidth / zoom;
                    const sh = v.videoHeight / zoom;
                    const sx = (v.videoWidth - sw) / 2;
                    const sy = (v.videoHeight - sh) / 2;
                    ctx.drawImage(v, sx, sy, sw, sh, 0, 0, c.width, c.height);

                    if (flash === "on" && facing === "environment") {
                        await track.applyConstraints({ advanced: [{ torch: false }] });
                    }

                    const img = c.toDataURL('image/jpeg', 1.0);
                    prev.style.backgroundImage = `url(${img})`;
                    
                    const l = document.createElement('a');
                    l.href = img; l.download = `Mahi_DSLR_${Date.now()}.jpg`;
                    l.click();
                }, 100);
            } else {
                isRec ? stopRec() : startRec();
            }
        }

        function startRec() {
            isRec = true; chunks = [];
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, {type:'video/mp4'});
                const l = document.createElement('a');
                l.href = URL.createObjectURL(b);
                l.download = `Mahi_Vid_${Date.now()}.mp4`;
                l.click();
            };
            recorder.start();
            document.getElementById('s-core').classList.add('rec-active');
        }

        function stopRec() {
            isRec = false; recorder.stop();
            document.getElementById('s-core').classList.remove('rec-active');
        }

        function flip() { facing = (facing === "user") ? "environment" : "user"; startApp(); }
        window.onload = startApp;
    </script>
</body>
</html>
