<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MahiCam Pro</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        #cam-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* असली कैमरा रेंडरिंग - GPU Accelerated */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform-origin: center;
            transition: filter 0.2s linear;
            will-change: transform, filter;
        }

        /* --- एडवांस्ड इंस्टाग्राम/स्नैपचैट फिल्टर्स --- */
        .normal { filter: none; }
        /* Beauty+: चकाचक गोरापन और पिंक ग्लो (High Brightness) */
        .beauty { filter: brightness(1.4) saturate(1.4) contrast(1.05) sepia(0.05); }
        /* Summer: एकदम चटक, ब्राइट और वाइब्रेंट कलर्स */
        .summer { filter: brightness(1.25) saturate(1.7) contrast(1.2) hue-rotate(-3deg); }
        /* AI Pro: क्रिस्टल क्लियर और डीप शार्प डिटेल्स (DSLR Look) */
        .ai-pro { filter: contrast(1.3) brightness(1.15) saturate(1.3) sepia(0.02); }

        /* UI डिजाइन */
        .top-controls { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 100; box-sizing: border-box; }
        .zoom-label { position: absolute; top: 80px; width: 100%; text-align: center; color: #00f2ff; font-weight: bold; font-size: 18px; z-index: 100; text-shadow: 0 0 10px #000; }
        
        .bottom-ui { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 30px 0 60px; z-index: 100; }
        .mode-scroller { display: flex; overflow-x: auto; gap: 20px; padding: 10px 40px; justify-content: flex-start; scrollbar-width: none; margin-bottom: 25px; }
        .mode-scroller::-webkit-scrollbar { display: none; }
        .m-item { min-width: 90px; text-align: center; color: #fff; font-size: 11px; font-weight: bold; opacity: 0.5; transition: 0.3s; cursor: pointer; text-transform: uppercase; }
        .m-item.active { opacity: 1; color: #00f2ff; transform: scale(1.15); border-bottom: 2px solid #00f2ff; }

        .action-row { display: flex; align-items: center; justify-content: space-evenly; }
        .gallery-preview { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-color: #222; }
        .shutter { width: 85px; height: 85px; border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.1); }
        .s-core { width: 68px; height: 68px; background: #fff; border-radius: 50%; transition: 0.15s; }
        .shutter:active .s-core { transform: scale(0.8); }
        .rec-on { background: #ff0000 !important; border-radius: 12px; }

        .btn { font-size: 32px; color: white; cursor: pointer; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="cam-container" ontouchstart="ts(event)" ontouchmove="tm(event)">
        <video id="v" autoplay playsinline muted></video>
        
        <div class="top-controls">
            <div class="btn" id="f-btn" onclick="toggleFlash()">⚡ OFF</div>
            <div class="btn" id="m-toggle" onclick="setCapMode()">📸</div>
        </div>

        <div class="zoom-label" id="z-txt">1.0x</div>

        <div class="bottom-ui">
            <div class="mode-scroller">
                <div class="m-item active" onclick="apply(this, 'normal')">Original</div>
                <div class="m-item" onclick="apply(this, 'beauty')">Beauty+</div>
                <div class="m-item" onclick="apply(this, 'summer')">Summer</div>
                <div class="m-item" onclick="apply(this, 'ai-pro')">AI Pro</div>
            </div>

            <div class="action-row">
                <div class="gallery-preview" id="prev"></div>
                <div class="shutter" onclick="trigger()">
                    <div class="s-core" id="s-core"></div>
                </div>
                <div class="btn" onclick="flip()">🔄</div>
            </div>
        </div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const prev = document.getElementById('prev');
        let stream, facing = "user", isVideo = false, isRec = false, recorder, chunks = [];
        let zoom = 1, flash = "off", dist0 = 0;

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                // हाई-परफॉरमेंस सेटिंग्स
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facing, width: {ideal: 1920}, height: {ideal: 1080} },
                    audio: true 
                });
                v.srcObject = stream;
            } catch (e) { alert("Camera Error!"); }
        }

        // --- 10x रिफ्रेश-फ्री जूम (Smooth Pinch) ---
        function ts(e) { if (e.touches.length === 2) dist0 = 0; }
        function tm(e) {
            if (e.touches.length === 2) {
                let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (dist0 === 0) dist0 = d;
                else {
                    let s = d / dist0;
                    zoom = Math.min(Math.max(1, zoom * s), 10);
                    v.style.transform = `scale(${zoom})`;
                    document.getElementById('z-txt').innerText = zoom.toFixed(1) + "x";
                    dist0 = d;
                }
            }
        }

        function toggleFlash() {
            flash = (flash === "off") ? "on" : "off";
            const btn = document.getElementById('f-btn');
            btn.innerText = (flash === "on") ? "⚡ ON" : "⚡ OFF";
            btn.style.color = (flash === "on") ? "#ffcc00" : "#fff";
        }

        function apply(el, f) {
            document.querySelectorAll('.m-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            v.className = f;
        }

        function setCapMode() {
            isVideo = !isVideo;
            document.getElementById('m-toggle').innerText = isVideo ? "🎥" : "📸";
        }

        async function trigger() {
            const track = stream.getVideoTracks()[0];
            if (flash === "on" && facing === "environment") {
                await track.applyConstraints({ advanced: [{ torch: true }] });
            }

            if (!isVideo) {
                // फोटो कैप्चर
                setTimeout(async () => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    const ctx = c.getContext('2d');
                    ctx.filter = getComputedStyle(v).filter;
                    
                    // जूम के साथ फोटो खींचना
                    const sw = v.videoWidth / zoom;
                    const sh = v.videoHeight / zoom;
                    const sx = (v.videoWidth - sw) / 2;
                    const sy = (v.videoHeight - sh) / 2;
                    ctx.drawImage(v, sx, sy, sw, sh, 0, 0, c.width, c.height);

                    if (flash === "on" && facing === "environment") {
                        await track.applyConstraints({ advanced: [{ torch: false }] });
                    }

                    const data = c.toDataURL('image/jpeg', 1.0);
                    prev.style.backgroundImage = `url(${data})`;
                    
                    // सेव लॉजिक
                    const l = document.createElement('a');
                    l.href = data; l.download = `Mahi_${Date.now()}.jpg`;
                    l.click();
                }, 150);
            } else {
                isRec ? stopR() : startR();
            }
        }

        function startR() {
            isRec = true; chunks = [];
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, {type:'video/mp4'});
                const l = document.createElement('a');
                l.href = URL.createObjectURL(b);
                l.download = `Mahi_Vid_${Date.now()}.mp4`; l.click();
            };
            recorder.start();
            document.getElementById('s-core').classList.add('rec-on');
        }

        function stopR() { 
            isRec = false; recorder.stop(); 
            document.getElementById('s-core').classList.remove('rec-on'); 
        }

        function flip() { facing = (facing === "user") ? "environment" : "user"; init(); }
        window.onload = init;
    </script>
</body>
</html>
