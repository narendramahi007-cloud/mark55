<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Beauty Plus Camera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* कैमरा कंटेनर - मोबाइल फ्रेंडली */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #111;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* वीडियो और प्रोसेसिंग कैनवास */
        #video-feed {
            display: none; /* बैकग्राउंड में रहेगा */
        }
        #view-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-grow: 1;
        }
        /* फ्लैश स्क्रीन इफ़ेक्ट */
        .flash-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        .flash-active {
            animation: flashAnim 0.4s ease-out;
        }
        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        /* टॉप कंट्रोल्स (फ्लैश और मोड स्विच) */
        .top-controls {
            position: absolute;
            top: 20px;
            left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 5;
        }
        .btn-icon {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .btn-icon.active {
            background: #fffd38;
            color: #000;
            border-color: #fffd38;
        }
        /* ज़ूम कंट्रोलर */
        .zoom-container {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 15px;
        }
        .zoom-slider {
            width: 100%;
            accent-color: #fe2c55;
        }
        .zoom-label {
            color: #fff;
            font-size: 12px;
        }
        /* बॉटम कंट्रोल पैनल */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 30%);
            padding: 20px 10px 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }
        /* फिल्टर कैरोसेल */
        .filter-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 5px 20px;
            scrollbar-width: none;
        }
        .filter-carousel::-webkit-scrollbar { display: none; }
        .filter-chip {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .filter-chip.active {
            background: #fe2c55;
            border-color: #fff;
            font-weight: bold;
        }
        /* मुख्य शटर एरिया */
        .shutter-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 40px;
        }
        .mode-toggle {
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 60px;
            text-align: center;
        }
        .mode-toggle.active {
            color: #fff;
            border-bottom: 2px solid #fff;
            padding-bottom: 2px;
        }
        /* इंस्टाग्राम/स्नैपचैट जैसा शटर बटन */
        .shutter-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: none;
            border: 6px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        .shutter-inside {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fff;
            transition: all 0.2s;
        }
        .shutter-btn.recording .shutter-inside {
            background: #fe2c55;
            transform: scale(0.85);
            border-radius: 8px;
        }
        /* रिकॉर्डिंग टाइमर */
        .timer {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff3b30;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 3px 10px;
            border-radius: 5px;
            display: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="camera-container">
    <!-- फ्लैश एनिमेशन लेयर -->
    <div class="flash-effect" id="flash-layer"></div>

    <!-- टॉप बार -->
    <div class="top-controls">
        <button class="btn-icon" id="btn-flash" onclick="toggleFlash()">⚡ Flash: OFF</button>
        <div class="timer" id="vid-timer">00:00</div>
        <button class="btn-icon" id="btn-cam-switch" onclick="switchCamera()">🔄 Switch</button>
    </div>

    <!-- लाइव वीडियो फ़ीड (छुपा हुआ) और रेंडरिंग कैनवास -->
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="view-canvas"></canvas>

    <!-- 10x ज़ूम स्लाइडर -->
    <div class="zoom-container">
        <input type="range" id="zoom-range" class="zoom-slider" min="1" max="10" step="0.1" value="1" oninput="updateZoom(this.value)">
        <span class="zoom-label" id="zoom-val">Zoom: 1.0x</span>
    </div>

    <!-- बॉटम कंट्रोल्स -->
    <div class="bottom-panel">
        <!-- फिल्टर्स/मोड्स कैरोसेल -->
        <div class="filter-carousel">
            <div class="filter-chip active" id="f-normal" onclick="setFilter('normal')">Normal</div>
            <div class="filter-chip" id="f-beauty" onclick="setFilter('beauty')">✨ Beauty Plus</div>
            <div class="filter-chip" id="f-summer" onclick="setFilter('summer')">☀️ Summer Mode</div>
            <div class="filter-chip" id="f-ai" onclick="setFilter('ai')">🤖 AI Glow</div>
        </div>

        <!-- शटर और फोटो/वीडियो स्विच -->
        <div class="shutter-area">
            <span class="mode-toggle active" id="mode-photo" onclick="setCaptureMode('photo')">PHOTO</span>
            <button class="shutter-btn" id="shutter-trigger" onclick="handleShutter()">
                <div class="shutter-inside" id="shutter-core"></div>
            </button>
            <span class="mode-toggle" id="mode-video" onclick="setCaptureMode('video')">VIDEO</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video-feed');
    const canvas = document.getElementById('view-canvas');
    const ctx = canvas.getContext('2d');
    const flashLayer = document.getElementById('flash-layer');
    
    let currentStream = null;
    let useFrontCamera = true;
    let currentFilter = 'normal'; // normal, beauty, summer, ai
    let captureMode = 'photo'; // photo, video
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let zoomLevel = 1.0;
    let isFlashOn = false;
    let timerInterval = null;

    // 1. कैमरा शुरू करने का फंक्शन
    async function initCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const constraints = {
            video: {
                facingMode: useFrontCamera ? "user" : "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: true
        };

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            video.play();
            
            // कैनवास साइज़ सेट करना
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                requestAnimationFrame(processFrame);
            };
        } catch (err) {
            alert("कैमरा एक्सेस करने में समस्या: " + err.message);
        }
    }

    // 2. रीयल-टाइम इमेज प्रोसेसिंग (Filters + Zoom Engine)
    function processFrame() {
        if (video.paused || video.ended) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();

        // ज़ूम कैलकुलेशन (सेंटर से क्रॉप और स्केल)
        const w = canvas.width;
        const h = canvas.height;
        const sw = w / zoomLevel;
        const sh = h / zoomLevel;
        const sx = (w - sw) / 2;
        const sy = (h - sh) / 2;

        // कैनवास पर वीडियो फ्रेम ड्रा करना (ज़ूम के साथ)
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);

        // ---- एआई और ब्यूटी फिल्टर्स इंजन ----
        let imageData = ctx.getImageData(0, 0, w, h);
        let data = imageData.data;

        if (currentFilter === 'beauty') {
            // ब्यूटी प्लस मोड: स्किन स्मूथनिंग + लाइट ब्राइटनेस
            // हम यहाँ एक फ़ास्ट सॉफ़्ट-ब्लर और हाईलाइट्स ऐल्गोरिदम का उपयोग कर रहे हैं
            for (let i = 0; i < data.length; i += 4) {
                // ब्राइटनेस बढ़ाना (दिल की शाइन और ग्लो के लिए)
                data[i] = Math.min(255, data[i] * 1.1);     // Red
                data[i+1] = Math.min(255, data[i+1] * 1.1); // Green
                data[i+2] = Math.min(255, data[i+2] * 1.05); // Blue
                
                // हल्का सा कंट्रास्ट एडजस्टमेंट जो स्किन टेक्सचर को सॉफ्ट दिखाता है
                let v = (data[i] + data[i+1] + data[i+2]) / 3;
                if(v > 120) {
                    data[i] = Math.min(255, data[i] + 10);
                    data[i+1] = Math.min(255, data[i+1] + 10);
                }
            }
            ctx.putImageData(imageData, 0, 0);
            // एक्स्ट्रा स्मूथ फील देने के लिए हल्का ग्लोबल ब्लर ओवरले
            ctx.globalAlpha = 0.15;
            ctx.filter = 'blur(4px)';
            ctx.drawImage(canvas, 0, 0);
            ctx.filter = 'none';
            ctx.globalAlpha = 1.0;

        } else if (currentFilter === 'summer') {
            // समर मोड: वार्म गोल्डन वाइब (इंस्टाग्राम स्टाइल)
            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.min(255, data[i] * 1.25);     // Red को काफी बढ़ाएं
                data[i+1] = Math.min(255, data[i+1] * 1.15); // Green को थोड़ा बढ़ाएं (गोल्डन टोन)
                data[i+2] = Math.min(255, data[i+2] * 0.9);   // Blue को कम करें ताकि पीलापन आए
            }
            ctx.putImageData(imageData, 0, 0);

        } else if (currentFilter === 'ai') {
            // एआई मोड: ऑटो कलर आइडेंटिफिकेशन और इंटेलिजेंट सैचुरेशन बूस्ट
            for (let i = 0; i < data.length; i += 4) {
                // कलर्स को पहचान कर डल कलर्स को पॉप करना
                let r = data[i], g = data[i+1], b = data[i+2];
                
                // अगर पिक्सल स्किन टोन रेंज में नहीं है (बैकग्राउंड कलर्स जैसे आसमान या पौधे), तो सैचुरेशन बढ़ाएं
                if (!(r > 95 && g > 40 && b > 20 && (Math.max(r,g,b) - Math.min(r,g,b) > 15) && Math.abs(r-g) > 15 && r > g && r > b)) {
                    data[i] = Math.min(255, r * 1.2);   
                    data[i+1] = Math.min(255, g * 1.2); 
                    data[i+2] = Math.min(255, b * 1.2); 
                } else {
                    // स्किन को हल्का सा पिंक-ग्लो इफ़ेक्ट देना
                    data[i] = Math.min(255, r * 1.1);
                    data[i+2] = Math.min(255, b * 1.05);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        ctx.restore();
        requestAnimationFrame(processFrame);
    }

    // 3. 10x ज़ूम कंट्रोलर
    function updateZoom(val) {
        zoomLevel = parseFloat(val);
        document.getElementById('zoom-val').innerText = `Zoom: ${zoomLevel.toFixed(1)}x`;
    }

    // 4. फ्लैश ऑन/ऑफ टॉगल
    function toggleFlash() {
        isFlashOn = !isFlashOn;
        const btn = document.getElementById('btn-flash');
        if (isFlashOn) {
            btn.innerText = "⚡ Flash: AUTO";
            btn.classList.add('active');
        } else {
            btn.innerText = "⚡ Flash: OFF";
            btn.classList.remove('active');
        }
    }

    // 5. कैमरा स्विच (Front/Back)
    function switchCamera() {
        useFrontCamera = !useFrontCamera;
        initCamera();
    }

    // 6. फिल्टर बदलने का लॉजिक
    function setFilter(filterType) {
        currentFilter = filterType;
        document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
        document.getElementById(`f-${filterType}`).classList.add('active');
    }

    // 7. कैप्चर मोड बदलना (PHOTO या VIDEO)
    function setCaptureMode(mode) {
        if(isRecording) return; // रिकॉर्डिंग के दौरान चेंज न हो
        captureMode = mode;
        document.getElementById('mode-photo').classList.toggle('active', mode === 'photo');
        document.getElementById('mode-video').classList.toggle('active', mode === 'video');
        
        const insideBtn = document.getElementById('shutter-core');
        insideBtn.style.background = mode === 'video' ? '#fe2c55' : '#fff';
    }

    // 8. मुख्य शटर बटन एक्शन handler
    function handleShutter() {
        if (captureMode === 'photo') {
            takePhoto();
        } else {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }
    }

    // 9. फोटो खींचना और ऑटो-फ्लैश लॉजिक
    function takePhoto() {
        // ऑटो फ्लैश चेक: अगर चालू है तो स्क्रीन चमकाएं
        if (isFlashOn) {
            flashLayer.classList.add('flash-active');
            setTimeout(() => flashLayer.classList.remove('flash-active'), 400);
        }

        // जिस समय क्लिक किया, कैनवास से तुरंत इमेज डेटा निकालना
        setTimeout(() => {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = `BeautyPlus_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();
        }, isFlashOn ? 100 : 0); // फ्लैश के ठीक बीच में फोटो कैप्चर होगी
    }

    // 10. वीडियो रिकॉर्डिंग इंजन
    function startRecording() {
        isRecording = true;
        recordedChunks = [];
        document.getElementById('shutter-trigger').classList.add('recording');
        
        // कैनवास से लाइव स्ट्रीम कैप्चर करना (30 FPS)
        const canvasStream = canvas.captureStream(30);
        
        // ऑडियो ट्रैक जोड़ना
        if (currentStream && currentStream.getAudioTracks().length > 0) {
            canvasStream.addTrack(currentStream.getAudioTracks()[0].clone());
        }

        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp9' });
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) {
                recordedChunks.push(e.data);
            }
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `BeautyPlus_Video_${Date.now()}.webm`;
            link.href = url;
            link.click();
        };

        mediaRecorder.start();
        startTimer();
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('shutter-trigger').classList.remove('recording');
        mediaRecorder.stop();
        stopTimer();
    }

    // वीडियो टाइमर फंक्शंस
    function startTimer() {
        const timerEl = document.getElementById('vid-timer');
        timerEl.style.display = 'block';
        let seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            timerEl.innerText = `${mins}:${secs}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        const timerEl = document.getElementById('vid-timer');
        timerEl.style.display = 'none';
        timerEl.innerText = '00:00';
    }

    // पेज लोड होते ही कैमरा चालू करें
    window.onload = initCamera;
</script>

</body>
</html>
