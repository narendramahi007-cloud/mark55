<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MahiCam Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background-color: #000; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; /* पेज को हिलने से रोकने के लिए */
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #view-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; /* पूरी स्क्रीन पर फैलाने के लिए */
            background: #000;
        }

        video { display: none; }

        .flash-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
        }
        .flash-active { animation: appFlash 0.3s ease-out; }
        @keyframes appFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* UI elements */
        .top-controls {
            position: absolute;
            top: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 15px; z-index: 10;
        }

        .btn-ui {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff; padding: 10px 18px;
            border-radius: 30px; font-size: 12px; font-weight: bold;
        }

        .zoom-area {
            position: absolute;
            bottom: 180px; left: 50%;
            transform: translateX(-50%);
            width: 80%; text-align: center; z-index: 10;
        }
        
        .zoom-slider { width: 100%; accent-color: #fff; height: 30px; }

        .bottom-ui {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 0 40px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .filters {
            display: flex; gap: 10px; overflow-x: auto;
            width: 100%; padding: 0 20px; scrollbar-width: none;
        }
        .chip {
            background: rgba(255,255,255,0.2); color: #fff;
            padding: 8px 15px; border-radius: 20px; font-size: 12px; white-space: nowrap;
        }
        .chip.active { background: #fff; color: #000; font-weight: bold; }

        .shutter-row {
            display: flex; align-items: center; justify-content: space-around; width: 100%;
        }
        .shutter-btn {
            width: 75px; height: 75px; border-radius: 50%;
            border: 5px solid #fff; display: flex; justify-content: center; align-items: center;
        }
        .shutter-in { width: 58px; height: 58px; border-radius: 50%; background: #fff; }
        .mode-lbl { color: #fff; font-size: 14px; font-weight: bold; opacity: 0.6; }
        .mode-lbl.active { opacity: 1; border-bottom: 2px solid #fff; }
    </style>
</head>
<body>

<div class="camera-container">
    <div class="flash-effect" id="flash-layer"></div>

    <div class="top-controls">
        <button class="btn-ui" id="f-btn" onclick="toggleFlash()">⚡ FLASH: OFF</button>
        <button class="btn-ui" onclick="switchCam()">🔄 SWITCH</button>
    </div>

    <video id="v-feed" autoplay playsinline muted></video>
    <canvas id="view-canvas"></canvas>

    <div class="zoom-area">
        <input type="range" class="zoom-slider" min="1" max="10" step="0.1" value="1" oninput="updateZoom(this.value)">
        <div style="color:#fff; font-size:10px;" id="z-val">1.0x ZOOM</div>
    </div>

    <div class="bottom-ui">
        <div class="filters">
            <div class="chip active" id="f-normal" onclick="setF('normal')">Original</div>
            <div class="chip" id="f-beauty" onclick="setF('beauty')">✨ Beauty Plus</div>
            <div class="chip" id="f-summer" onclick="setF('summer')">☀️ Summer</div>
            <div class="chip" id="f-ai" onclick="setF('ai')">🤖 AI Glow</div>
        </div>

        <div class="shutter-row">
            <span class="mode-lbl active" id="m-photo" onclick="setM('photo')">PHOTO</span>
            <div class="shutter-btn" onclick="action()"><div class="shutter-in" id="shutter-core"></div></div>
            <span class="mode-lbl" id="m-video" onclick="setM('video')">VIDEO</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('v-feed');
    const canvas = document.getElementById('view-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const flashLayer = document.getElementById('flash-layer');
    
    let stream = null;
    let front = true;
    let filter = 'normal';
    let mode = 'photo';
    let zoom = 1.0;
    let isFlash = false;
    let isRec = false;
    let recorder = null;
    let chunks = [];

    async function init() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: front ? "user" : "environment", width: 1280, height: 720 },
                audio: true
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                render();
            };
        } catch (e) { alert("Camera Error: " + e); }
    }

    function render() {
        if (video.paused) return;
        
        ctx.save();
        // Zoom logic
        const w = canvas.width, h = canvas.height;
        const sw = w / zoom, sh = h / zoom;
        const sx = (w - sw) / 2, sy = (h - sh) / 2;
        
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);

        // Pixel Engine
        if (filter !== 'normal') {
            let img = ctx.getImageData(0, 0, w, h);
            let d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                if (filter === 'beauty') {
                    d[i] = d[i] * 1.2 + 20;     // White
                    d[i+1] = d[i+1] * 1.15 + 20; // Glow
                    d[i+2] = d[i+2] * 1.1 + 15;  // Clear
                } else if (filter === 'summer') {
                    d[i] = d[i] * 1.3; // Warm
                    d[i+1] = d[i+1] * 1.1; 
                    d[i+2] = d[i+2] * 0.9;
                } else if (filter === 'ai') {
                    d[i] = d[i] * 1.1 + 10;
                    d[i+1] = d[i+1] * 1.1 + 10;
                    d[i+2] = d[i+2] * 1.1 + 10;
                }
            }
            ctx.putImageData(img, 0, 0);
            if (filter === 'beauty') {
                ctx.globalAlpha = 0.2;
                ctx.filter = 'blur(2px) contrast(1.1)';
                ctx.drawImage(canvas, 0, 0);
                ctx.filter = 'none'; ctx.globalAlpha = 1;
            }
        }
        ctx.restore();
        requestAnimationFrame(render);
    }

    function updateZoom(v) { zoom = parseFloat(v); document.getElementById('z-val').innerText = zoom.toFixed(1) + "x ZOOM"; }
    
    function toggleFlash() {
        isFlash = !isFlash;
        const b = document.getElementById('f-btn');
        b.innerText = isFlash ? "⚡ FLASH: ON" : "⚡ FLASH: OFF";
        b.classList.toggle('flash-on', isFlash);
    }

    function switchCam() { front = !front; init(); }

    function setF(f) {
        filter = f;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        document.getElementById('f-'+f).classList.add('active');
    }

    function setM(m) {
        mode = m;
        document.getElementById('m-photo').classList.toggle('active', m === 'photo');
        document.getElementById('m-video').classList.toggle('active', m === 'video');
        document.getElementById('shutter-core').style.background = m === 'video' ? '#ff3b30' : '#fff';
    }

    function action() {
        if (mode === 'photo') {
            if (isFlash) {
                flashLayer.classList.add('flash-active');
                setTimeout(() => flashLayer.classList.remove('flash-active'), 300);
            }
            setTimeout(() => {
                const link = document.createElement('a');
                link.download = `MahiCam_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            }, 100);
        } else {
            if (!isRec) startRec(); else stopRec();
        }
    }

    function startRec() {
        isRec = true; chunks = [];
        document.getElementById('shutter-trigger').parentElement.classList.add('recording');
        recorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `MahiCam_Vid_${Date.now()}.webm`;
            link.click();
        };
        recorder.start();
    }

    function stopRec() { isRec = false; recorder.stop(); }

    window.onload = init;
</script>
</body>
</html>
