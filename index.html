<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahi DSLR Pro</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }

        /* --- अल्ट्रा-वाइब्रेंट विश्व सुंदरी फिल्टर्स --- */
        .normal { filter: none; }
        /* Beauty+: असली गोरापन और शार्प डिटेल्स */
        .beauty { filter: brightness(1.3) contrast(1.15) saturate(1.4) sepia(0.04) sharpness(1.5); }
        /* Summer: एकदम वाइब्रेंट और साफ़ रंग */
        .summer { filter: brightness(1.2) contrast(1.25) saturate(1.7) hue-rotate(-2deg); }
        /* AI Mode: DSLR जैसा गहरा और साफ़ लुक */
        .ai-mode { filter: contrast(1.4) brightness(1.1) saturate(1.25) saturate(1.3); }

        .top-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 100; box-sizing: border-box; }
        
        /* जूम स्लाइडर - रिफ्रेश फ्री */
        .zoom-slider-cont { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); z-index: 100; }
        #zoomRange { appearance: none; width: 180px; height: 3px; background: rgba(255,255,255,0.3); transform: rotate(-90deg); cursor: pointer; }

        .overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 40px 0 60px; z-index: 100; }
        
        .filter-options { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .f-label { color: #aaa; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .f-label.active { color: #00f2ff; font-weight: bold; transform: scale(1.1); }

        .shutter-row { display: flex; align-items: center; justify-content: space-evenly; }
        .gallery-preview { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; background-color: #333; }
        .shutter-btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-in { width: 68px; height: 68px; background: #fff; border-radius: 50%; transition: 0.2s; }
        .shutter-btn:active .shutter-in { transform: scale(0.8); }

        .flash-btn { font-size: 28px; cursor: pointer; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="container">
        <video id="v" autoplay playsinline muted></video>
        
        <div class="top-ui">
            <div class="flash-btn" id="flashStatus" onclick="toggleFlashState()">⚡ OFF</div>
            <div onclick="flip()" style="font-size:30px; color:#fff; cursor:pointer;">🔄</div>
        </div>

        <div class="zoom-slider-cont">
            <input type="range" id="zoomRange" min="1" max="6" step="0.1" value="1" oninput="doZoom(this.value)">
        </div>

        <div class="overlay">
            <div class="filter-options">
                <span class="f-label active" onclick="setF(this, 'normal')">ORIGINAL</span>
                <span class="f-label" onclick="setF(this, 'beauty')">BEAUTY+</span>
                <span class="f-label" onclick="setF(this, 'summer')">SUMMER</span>
                <span class="f-label" onclick="setF(this, 'ai-mode')">AI DSLR</span>
            </div>

            <div class="shutter-row">
                <div class="gallery-preview" id="preview"></div>
                <div class="shutter-btn" onclick="takePhoto()">
                    <div class="shutter-in"></div>
                </div>
                <div style="width:50px;"></div> </div>
        </div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const preview = document.getElementById('preview');
        let stream, facing = "user", isFlashReady = false;

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facing, width: {ideal: 3840}, height: {ideal: 2160} } 
                });
                v.srcObject = stream;
            } catch (e) { alert("Camera Permission Error!"); }
        }

        function toggleFlashState() {
            isFlashReady = !isFlashReady;
            const btn = document.getElementById('flashStatus');
            btn.innerText = isFlashReady ? "⚡ ON" : "⚡ OFF";
            btn.style.color = isFlashReady ? "#ffcc00" : "#fff";
        }

        function doZoom(val) {
            v.style.transform = `scale(${val})`;
            const track = stream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.zoom) {
                track.applyConstraints({ advanced: [{ zoom: val }] });
            }
        }

        function setF(el, f) {
            document.querySelectorAll('.f-label').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            v.className = f;
        }

        async function takePhoto() {
            const track = stream.getVideoTracks()[0];
            
            // 1. अगर फ्लैश 'ON' है, तो सिर्फ कैप्चर के वक्त टॉर्च जलेगी
            if (isFlashReady && facing === "environment") {
                await track.applyConstraints({ advanced: [{ torch: true }] });
            }

            // 2. कैप्चर प्रोसेस
            setTimeout(async () => {
                c.width = v.videoWidth; c.height = v.videoHeight;
                const ctx = c.getContext('2d');
                ctx.filter = getComputedStyle(v).filter;
                ctx.drawImage(v, 0, 0, c.width, c.height);

                // 3. फोटो खींचते ही फ्लैश बंद
                if (isFlashReady && facing === "environment") {
                    await track.applyConstraints({ advanced: [{ torch: false }] });
                }

                const data = c.toDataURL('image/jpeg', 1.0);
                preview.style.backgroundImage = `url(${data})`;
                
                // ऑटो सेव (गैलरी में भेजने के लिए)
                const link = document.createElement('a');
                link.href = data;
                link.download = `Mahi_${Date.now()}.jpg`;
                link.click();
            }, 100); // 100ms का डिले ताकि फ्लैश की रौशनी आ जाए
        }

        function flip() { facing = (facing === "user") ? "environment" : "user"; init(); }
        window.onload = init;
    </script>
</body>
</html>
