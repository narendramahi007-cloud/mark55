<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahi AI Pro Camera</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; height: 100vh; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s ease; }
        
        /* फ्रंट फ्लैश के लिए स्क्रीन को सफ़ेद करना */
        #front-flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:99; transition: 0.1s; }

        /* ब्यूटी फिल्टर्स - पक्का वर्किंग */
        .normal { filter: none; }
        .beauty { filter: brightness(1.25) contrast(1.1) saturate(1.3) sepia(0.05); } /* साफ़ और गोरा */
        .summer { filter: brightness(1.2) contrast(1.15) saturate(1.5) hue-rotate(-3deg); } /* वाइब्रेंट */
        .ai-mode { filter: contrast(1.2) brightness(1.1) saturate(1.2) sepia(0.02); } /* AI बैलेंस्ड */

        /* UI डिजाइन */
        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 100; box-sizing: border-box; }
        .zoom-info { position: absolute; top: 70px; width: 100%; text-align: center; color: #ffcc00; font-weight: bold; z-index: 100; }
        
        .overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 0 50px; z-index: 100; }
        .filter-scroller { display: flex; overflow-x: auto; gap: 15px; padding: 10px 30px; justify-content: center; scrollbar-width: none; }
        .f-item { min-width: 80px; text-align: center; cursor: pointer; opacity: 0.6; }
        .f-item.active { opacity: 1; color: #ffcc00; font-weight: bold; }
        
        .controls { display: flex; align-items: center; justify-content: space-evenly; margin-top: 20px; }
        .shutter { width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-inner { width: 60px; height: 60px; background: #fff; border-radius: 50%; }
        .rec-active { background: #ff0000 !important; border-radius: 10px; }
        
        .icon { font-size: 30px; cursor: pointer; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="front-flash-overlay"></div>

    <div id="container" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)">
        <video id="v" autoplay playsinline muted></video>
        
        <div class="zoom-info" id="zoom-text">1.0x</div>

        <div class="top-bar">
            <div class="icon" onclick="toggleFlash()">⚡</div>
            <div class="icon" id="mode-text" onclick="toggleCaptureMode()">📸</div>
        </div>

        <div class="overlay">
            <div class="filter-scroller">
                <div class="f-item active" onclick="setF(this, 'normal')">Normal</div>
                <div class="f-item" onclick="setF(this, 'beauty')">Beauty</div>
                <div class="f-item" onclick="setF(this, 'summer')">Summer</div>
                <div class="f-item" onclick="setF(this, 'ai-mode')">AI Mode</div>
            </div>

            <div class="controls">
                <div class="icon" onclick="flip()">🔄</div>
                <div class="shutter" onclick="doAction()">
                    <div class="shutter-inner" id="s-inner"></div>
                </div>
                <div style="width: 50px;"></div> </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('canvas');
        let stream, facing = "user", isVideo = false, isRecording = false, recorder, chunks = [];
        let zoomLevel = 1, initialDist = 0;

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facing, width: {ideal: 3840}, height: {ideal: 2160} },
                    audio: true 
                });
                v.srcObject = stream;
            } catch (err) { alert("Camera Error!"); }
        }

        // --- जूमिंग कंट्रोल (पिंच टू जूम) ---
        function handleTouchMove(e) {
            if (e.touches.length === 2) {
                let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (initialDist === 0) { initialDist = dist; }
                else {
                    let delta = dist / initialDist;
                    zoomLevel = Math.min(Math.max(1, zoomLevel * delta), 5); // 5x तक जूम
                    v.style.transform = `scale(${zoomLevel})`;
                    document.getElementById('zoom-text').innerText = zoomLevel.toFixed(1) + "x";
                    initialDist = dist;
                }
            }
        }
        function handleTouchStart(e) { if (e.touches.length === 2) initialDist = 0; }

        // --- फ्लैशलाइट (फ्रंट और बैक) ---
        async function toggleFlash() {
            if (facing === "environment") {
                const track = stream.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if (caps.torch) {
                    const isTorch = !track.getConstraints().advanced?.[0]?.torch;
                    await track.applyConstraints({ advanced: [{ torch: isTorch }] });
                }
            } else {
                // फ्रंट फ्लैश जुगाड़
                const overlay = document.getElementById('front-flash-overlay');
                overlay.style.opacity = (overlay.style.opacity == "1") ? "0" : "1";
            }
        }

        function setF(el, f) {
            document.querySelectorAll('.f-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            v.className = f;
        }

        function toggleCaptureMode() {
            isVideo = !isVideo;
            document.getElementById('mode-text').innerText = isVideo ? "🎥" : "📸";
        }

        function doAction() {
            if (!isVideo) {
                c.width = v.videoWidth; c.height = v.videoHeight;
                const ctx = c.getContext('2d');
                ctx.filter = getComputedStyle(v).filter;
                ctx.scale(zoomLevel, zoomLevel); // जूम की हुई फोटो सेव करना
                ctx.drawImage(v, -(c.width*(zoomLevel-1)/2)/zoomLevel, -(c.height*(zoomLevel-1)/2)/zoomLevel, c.width, c.height);
                const a = document.createElement('a');
                a.download = `Mahi_${Date.now()}.jpg`;
                a.href = c.toDataURL('image/jpeg', 1.0); a.click();
            } else {
                isRecording ? stopRec() : startRec();
            }
        }

        function startRec() {
            isRecording = true; chunks = [];
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `Mahi_Vid_${Date.now()}.mp4`; a.click();
            };
            recorder.start();
            document.getElementById('s-inner').classList.add('rec-active');
        }

        function stopRec() {
            isRecording = false; recorder.stop();
            document.getElementById('s-inner').classList.remove('rec-active');
        }

        function flip() { facing = (facing === "user") ? "environment" : "user"; init(); }
        window.onload = init;
    </script>
</body>
</html>
